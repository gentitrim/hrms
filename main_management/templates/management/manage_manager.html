{% load static %}

<div class="container mt-5" id="manager-list">
  <div class="d-flex justify-content-between mb-3">
    <h2>Manager List</h2>
    <button class="btn btn-outline-secondary mb-3"
            hx-get="{% url 'create_manager' %}"
            hx-redirect ="{% url 'manager_list' %}"
            hx-target="#modal-body"
            hx-trigger="click"
            hx-swap="innerHTML"
            data-bs-toggle="modal"
            data-bs-target="#managerModal">
      ➕ Create Manager
    </button>
  </div>

  <ul class="list-group">
    {% for manager in managers %}
    <li class="list-group-item d-flex justify-content-between align-items-center" id="manager-{{ manager.id }}">
      <div>
        <p>{{ manager.user.first_name }} {{ manager.user.last_name }}</p>
      </div>
      <div>
        <!-- View -->
        <button class="btn btn-sm btn-outline-info"
                hx-get="{% url 'manager_detail' manager.id %}"
                hx-target="#modal-body"
                hx-swap="innerHTML"
                data-bs-toggle="modal"
                data-bs-target="#managerModal">
          View
        </button>

        <!-- Edit -->
        <button class="btn btn-sm btn-outline-warning"
                hx-get="{% url 'edit_manager' manager.id %}"
                hx-target="#modal-body"
                hx-swap="innerHTML"
                data-bs-toggle="modal"
                data-bs-target="#managerModal">
          Edit
        </button>

        <!-- Delete -->
        <button class="btn btn-sm btn-outline-danger"
                hx-get="{% url 'delete_manager' manager.id %}"
                hx-target="#modal-body"
                hx-swap="innerHTML"
                data-bs-toggle="modal"
                data-bs-target="#managerModal">
          Delete
        </button>
      </div>
    </li>
    {% empty %}
      <li class="list-group-item text-center">No managers found.</li>
    {% endfor %}
  </ul>

  <!-- Pagination -->
  <div class="pagination mt-4">
    {% for page_num in page_obj.paginator.page_range %}
      <a href="?page={{ page_num }}" class="btn btn-outline-secondary btn-sm {% if page_obj.number == page_num %}active{% endif %}">
        {{ page_num }}
      </a>
    {% endfor %}
  </div>
</div>

<!-- Modal universal për View / Edit / Delete / Create -->
<div class="modal fade" id="managerModal" tabindex="-1" aria-labelledby="managerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="managerModalLabel">Manager</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div id="modal-body" class="modal-body">
        <!-- Ngarkohet me HTMX -->
      </div>
    </div>
  </div>
</div>
